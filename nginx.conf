server {
    listen 80 default_server;
    server_name _;

    auth_basic "Mamos Crypto — Accès Restreint";
    auth_basic_user_file /etc/nginx/htpasswd;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/html text/css application/javascript application/json;

    # ── STATIC ASSETS ──
    location /locales/ {
        add_header Cache-Control "no-cache";
        try_files $uri =404;
    }

    location /js/ {
        add_header Cache-Control "no-cache";
        try_files $uri =404;
    }

    # ── LANG-PREFIXED URLS (/en/, /fr/) — serve index.html, let JS handle lang ──
    location ~ ^/(en|fr)/?$ {
        try_files /index.html =404;
    }

    location ~ ^/(en|fr)/tools/options-analyzer$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        try_files /options_analyzer.html =404;
    }

    location ~ ^/(en|fr)/tools/mtc-dashboard$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        try_files /mtc_dashboard.html =404;
    }

    location ~ ^/(en|fr)/tools/options-sp500$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        try_files /options_sp500.html =404;
    }

    location ~ ^/(en|fr)/tools/options-vix$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        try_files /options_vix.html =404;
    }

    location ~ ^/(en|fr)/tools/options-indices$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        try_files /options_indices.html =404;
    }

    location ~ ^/(en|fr)(/.*)?$ {
        try_files /index.html =404;
    }

    # ── HUB — landing page principale ──
    location = / {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        try_files /index.html =404;
    }

    location = /tools {
        try_files /index.html =404;
    }

    # ── TOOLS URLS ──
    location = /tools/options-analyzer {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        try_files /options_analyzer.html =404;
    }

    location = /tools/mtc-dashboard {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        try_files /mtc_dashboard.html =404;
    }

    location = /tools/options-sp500 {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        try_files /options_sp500.html =404;
    }

    location = /tools/options-vix {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        try_files /options_vix.html =404;
    }

    location = /tools/options-indices {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        try_files /options_indices.html =404;
    }

    # ── ROUTE TEST ISOLÉE — ne pas supprimer sans validation prod ──
    location = /test/option {
        auth_basic off;
        try_files /test_option.html =404;
        add_header X-Route-Version "test" always;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    }

    # ── FALLBACK SPA ──
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── API EXISTANTE (home dashboard) ──
    location /api/ {
        auth_basic off;
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 30s;
        proxy_connect_timeout 10s;
    }

    # ── API OPTIONS NAMESPACÉE — /api/options/* → backend /api/* ──
    location /api/options/ {
        auth_basic off;
        rewrite ^/api/options/(.*) /api/$1 break;
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 30s;
        proxy_connect_timeout 10s;

        proxy_intercept_errors on;
        error_page 502 503 504 = @options_backend_fallback;
    }

    location @options_backend_fallback {
        auth_basic off;
        default_type application/json;
        add_header Access-Control-Allow-Origin "*" always;
        return 503 '{"error":"Options backend indisponible","status":"down","endpoint":"options"}';
    }

    location /health {
        auth_basic off;
        proxy_pass http://backend:8000;
    }
}

# ── trading.mamoscrypto.com — redirect HTTP → HTTPS (géré par nginx hôte sur 443) ──
server {
    listen 80;
    server_name trading.mamoscrypto.com;

    root /usr/share/nginx/html;

    location /.well-known/acme-challenge/ {
        proxy_pass http://172.19.0.1:8090;
        proxy_set_header Host $host;
    }

    location = /tools/options-analyzer {
        auth_basic off;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        try_files /options_analyzer.html =404;
    }

    location = /tools/mtc-dashboard {
        auth_basic off;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        try_files /mtc_dashboard.html =404;
    }

    location = /tools/options-sp500 {
        auth_basic off;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        try_files /options_sp500.html =404;
    }

    location = /tools/options-vix {
        auth_basic off;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        try_files /options_vix.html =404;
    }

    location = /tools/options-indices {
        auth_basic off;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        try_files /options_indices.html =404;
    }

    location /api/ {
        auth_basic off;
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 30s;
        proxy_connect_timeout 10s;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}


